name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .exe
        run: python build.py

      - name: Read version
        id: version
        shell: bash
        run: echo "ver=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Zip release folder
        shell: pwsh
        run: Compress-Archive -Path dist/StockAssistant/* -DestinationPath StockAssistant-${{ steps.version.outputs.ver }}-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Stock Assistant v${{ steps.version.outputs.ver }}
          body: |
            ## Download

            1. Download **StockAssistant-${{ steps.version.outputs.ver }}-windows.zip** below.
            2. Extract the zip to any folder.
            3. Double-click **StockAssistant.exe** to launch.

            No Python installation required.
          files: StockAssistant-${{ steps.version.outputs.ver }}-windows.zip

name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip

      - name: Build .exe
        run: python build.py

      - name: Write build metadata (verify downloaded zip matches this run)
        shell: bash
        run: |
          OUT="dist/StockAssistant/BUILD_INFO.txt"
          {
            echo "github_sha=${GITHUB_SHA}"
            echo "github_ref=${GITHUB_REF_NAME}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            date -u "+%Y-%m-%dT%H:%M:%SZ" | sed 's/^/built_at=/'
          } > "$OUT"
          cat "$OUT"

      - name: Read version
        id: version
        shell: bash
        run: echo "ver=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Zip release folder
        shell: pwsh
        run: Compress-Archive -Path dist/StockAssistant/* -DestinationPath StockAssistant-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Stock Assistant
          body: |
            ## Download

            1. Download **StockAssistant-windows.zip** below (same filename each release; use the tag and `BUILD_INFO.txt` inside the zip to identify the build).
            2. Extract the zip to any folder.
            3. Double-click **StockAssistant.exe** to launch.

            No Python installation required.

            **This tag:** `${{ github.ref_name }}` — **VERSION** in the bundle matches the `VERSION` file at this commit.
          files: StockAssistant-windows.zip
